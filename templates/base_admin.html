<!DOCTYPE html>
<html>
<head>
<title>{{ title if title else "Admin Panel" }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

.sidebar {
    height: 100vh;
    background: #1e293b;
    padding: 20px;
    position: fixed;
    width: 240px;
}

.sidebar h4 {
    color: #38bdf8;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 5px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: #334155;
}

.main-content {
    margin-left: 260px;
    padding: 30px;
}

.card {
    background: #1e293b;
    border: none;
    border-radius: 15px;
    color: #e2e8f0;
}

.btn-primary {
    background: #3b82f6;
    border: none;
}

.btn-danger {
    background: #ef4444;
    border: none;
}

.stat-number {
    font-size: 28px;
    font-weight: bold;
}

.form-control {
    background: #0f172a;
    border: 1px solid #334155;
    color: white;
}

.form-control:focus {
    background: #0f172a;
    color: white;
    border-color: #3b82f6;
    box-shadow: none;
}

</style>
</head>

<body>

<div class="sidebar">
    <h4>AI Recruitment</h4>
    <hr style="border-color:#334155;">
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/shortlisted">Shortlisted</a>
    <a href="/logout">Logout</a>
</div>

<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
